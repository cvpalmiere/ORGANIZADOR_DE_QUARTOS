let encontroAtual = null;
let encontros = [];
let sortables = [];

function uid() { return Date.now().toString(36) + Math.random().toString(36).substr(2, 8); }
function toast(msg) { const el = document.getElementById('toast'); el.textContent = msg; el.style.display = 'block'; setTimeout(() => el.style.display = 'none', 2500); }
function fecharModal(id) { document.getElementById(id).classList.remove('open'); }
function salvar() { localStorage.setItem('encontros_quartos_v2', JSON.stringify(encontros)); }

// Função para resetar completamente o sistema
function resetarSistema() {
  if (confirm('⚠️ Isso vai APAGAR todos os dados salvos e recriar o encontro do zero. Todos os participantes e quartos voltarão ao estado original. Continuar?')) {
    localStorage.removeItem('encontros_quartos_v2');
    inicializarDadosPadrao();
    if (encontros.length) encontroAtual = encontros[0].id;
    renderDistribuir();
    renderParticipantes();
    renderResumo();
    atualizarBages();
    toast('✅ Sistema resetado com sucesso!');
  }
}

// Função que CRIA o encontro do ZERO - sem erros
function inicializarDadosPadrao() {
  // Criar quartos com ID único
  const quartos = QUARTOS_FIXOS.map(q => ({
    id: uid(),
    nome: q.nome,
    cor: q.cor,
    capacidade: q.capacidade,
    lideresPorQuarto: q.lideresPorQuarto,
    lideres: [...q.lideres],
    participantesIds: []
  }));
  
  // Mapa para localizar quarto pelo nome
  const mapaQuartos = new Map();
  quartos.forEach(q => mapaQuartos.set(q.nome, q));
  
  // Criar TODOS os participantes (com quarto + novos)
  const todosParticipantes = [];
  
  // Adicionar participantes que já têm quarto (com alocação)
  for (const p of PARTICIPANTES_COM_QUARTO) {
    const id = uid();
    const participante = {
      id: id,
      nome: p.nome,
      idade: p.idade,
      telefone: p.telefone,
      unidade: p.unidade,
      celula: p.celula,
      emergenciaNome: p.emergenciaNome,
      emergenciaTel: p.emergenciaTel
    };
    todosParticipantes.push(participante);
    
    // Alocar no quarto correto
    const quartoDestino = mapaQuartos.get(p.quartoDestino);
    if (quartoDestino) {
      quartoDestino.participantesIds.push(id);
    }
  }
  
  // Adicionar participantes NOVOS (sem quarto)
  for (const p of PARTICIPANTES_NOVOS) {
    const id = uid();
    todosParticipantes.push({
      id: id,
      nome: p.nome,
      idade: p.idade,
      telefone: p.telefone,
      unidade: p.unidade,
      celula: p.celula,
      emergenciaNome: p.emergenciaNome,
      emergenciaTel: p.emergenciaTel
    });
    // NÃO alocar - ficam sem quarto
  }
  
  const novoEncontro = {
    id: uid(),
    nome: 'Acampamento de Homens 2026 - 15/05 a 17/05',
    dataInicio: '2026-05-15',
    dataFim: '2026-05-17',
    participantes: todosParticipantes,
    quartos: quartos
  };
  
  encontros = [novoEncontro];
  salvar();
}

function carregar() {
  const data = localStorage.getItem('encontros_quartos_v2');
  if (data) {
    try {
      const parsed = JSON.parse(data);
      if (parsed && parsed.length > 0 && parsed[0].participantes && parsed[0].quartos) {
        encontros = parsed;
      } else {
        // Dados corrompidos - recriar
        inicializarDadosPadrao();
      }
    } catch(e) {
      inicializarDadosPadrao();
    }
  } else {
    inicializarDadosPadrao();
  }
}

function getEnc() { return encontros.find(e => e.id === encontroAtual); }

function atualizarBages() {
  const enc = getEnc();
  if (!enc) return;
  const alocados = new Set();
  enc.quartos.forEach(q => (q.participantesIds || []).forEach(id => alocados.add(id)));
  document.getElementById('totalParticipantesBadge').innerHTML = `${enc.participantes.length} participantes`;
  document.getElementById('totalAlocadosBadge').innerHTML = `${alocados.size} alocados`;
}

function renderDistribuir() {
  const enc = getEnc();
  if (!enc) { console.warn('Nenhum encontro selecionado'); return; }
  const grid = document.getElementById('quartosDistribuirGrid');
  if (!enc.quartos || !enc.quartos.length) { grid.innerHTML = '<div class="card-body">Nenhum quarto configurado</div>'; return; }
  
  // Destruir sortables antigos
  sortables.forEach(s => { try { s.destroy(); } catch(e) {} });
  sortables = [];
  
  grid.innerHTML = enc.quartos.map((q, idx) => {
    const participantesQuarto = (q.participantesIds || []).map(pid => enc.participantes.find(p => p.id === pid)).filter(Boolean);
    const vagas = (q.capacidade || 10) - (q.lideresPorQuarto || 2);
    const total = participantesQuarto.length;
    const pct = vagas > 0 ? (total / vagas) * 100 : 100;
    let progressClass = pct >= 100 ? 'full' : (pct >= 80 ? 'warning' : '');
    return `
      <div class="quarto-card">
        <div class="quarto-header" style="background:${q.cor}"><strong>🛏️ ${q.nome}</strong><span>${total}/${vagas}</span></div>
        <div class="quarto-body">
          <div class="lideres-list">${(q.lideres || []).map(l => `<span class="lider-tag">👑 ${l}</span>`).join('') || '<span class="text-muted">Nenhum líder</span>'}</div>
          <div class="pessoas-drop" data-quarto-idx="${idx}" data-quarto-id="${q.id}">
            ${participantesQuarto.length ? participantesQuarto.map(p => `<div class="pessoa-row" data-id="${p.id}"><span class="pessoa-nome">${p.nome}</span><span class="pessoa-idade">${p.idade || '?'}a</span></div>`).join('') : '<div class="empty-drop">📌 Arraste participantes para cá</div>'}
          </div>
          <div class="progress-bar"><div class="progress-fill ${progressClass}" style="width:${Math.min(100, pct)}%"></div></div>
        </div>
      </div>
    `;
  }).join('');
  
  // Inicializar Sortable
  document.querySelectorAll('.pessoas-drop').forEach(zone => {
    const s = new Sortable(zone, {
      group: 'quartos',
      animation: 200,
      onEnd: (evt) => {
        const pessoaId = evt.item.dataset.id;
        const quartoOrigemId = evt.from.dataset.quartoId;
        const quartoDestinoId = evt.to.dataset.quartoId;
        if (quartoOrigemId === quartoDestinoId) return;
        const enc = getEnc();
        const quartoOrigem = enc.quartos.find(q => q.id === quartoOrigemId);
        const quartoDestino = enc.quartos.find(q => q.id === quartoDestinoId);
        const pessoa = enc.participantes.find(p => p.id === pessoaId);
        if (!pessoa || !quartoOrigem || !quartoDestino) return;
        const vagasDestino = (quartoDestino.capacidade || 10) - (quartoDestino.lideresPorQuarto || 2);
        if ((quartoDestino.participantesIds || []).length >= vagasDestino) { toast(`Quarto ${quartoDestino.nome} está cheio!`); renderDistribuir(); return; }
        quartoOrigem.participantesIds = (quartoOrigem.participantesIds || []).filter(id => id !== pessoaId);
        if (!quartoDestino.participantesIds) quartoDestino.participantesIds = [];
        quartoDestino.participantesIds.push(pessoaId);
        salvar();
        renderDistribuir();
        renderParticipantes();
        atualizarBages();
        toast(`${pessoa.nome} → ${quartoDestino.nome}`);
      }
    });
    sortables.push(s);
  });
}

function renderParticipantes() {
  const enc = getEnc();
  if (!enc) return;
  const quartoMap = new Map();
  enc.quartos.forEach(q => { (q.participantesIds || []).forEach(pid => quartoMap.set(pid, q.nome)); });
  
  const tbody = document.getElementById('participantesTbody');
  tbody.innerHTML = enc.participantes.map(p => `
    <tr>
      <td><strong>${p.nome}</strong></td>
      <td>${p.idade || '—'}</td>
      <td class="monospace">${p.telefone || '—'}</td>
      <td>${p.unidade || '—'}</td>
      <td>${p.celula || '—'}</td>
      <td>${quartoMap.has(p.id) ? '<span class="badge-alocado">✓ Alocado</span>' : '<span class="badge-semquarto">⚠️ Sem quarto</span>'}</td>
      <td>${quartoMap.get(p.id) || '—'}</td>
      <td><button class="btn btn-outline" onclick="removerParticipante('${p.id}')" style="padding:4px 12px">✕</button></td>
    </tr>
  `).join('');
  atualizarBages();
}

window.removerParticipante = (id) => {
  const enc = getEnc();
  if (!enc) return;
  enc.participantes = enc.participantes.filter(p => p.id !== id);
  enc.quartos.forEach(q => { q.participantesIds = (q.participantesIds || []).filter(pid => pid !== id); });
  salvar();
  renderParticipantes();
  renderDistribuir();
  atualizarBages();
  toast('Participante removido');
};

function distribuirNovos() {
  const enc = getEnc();
  if (!enc) return;
  const alocadosIds = new Set();
  enc.quartos.forEach(q => (q.participantesIds || []).forEach(id => alocadosIds.add(id)));
  const novos = enc.participantes.filter(p => !alocadosIds.has(p.id));
  if (novos.length === 0) { toast('Todos os participantes já estão alocados!'); return; }
  
  for (const p of novos) {
    const disponiveis = enc.quartos.filter(q => {
      const vagas = (q.capacidade || 10) - (q.lideresPorQuarto || 2);
      return (q.participantesIds || []).length < vagas;
    });
    if (disponiveis.length) {
      disponiveis.sort((a, b) => (a.participantesIds || []).length - (b.participantesIds || []).length);
      disponiveis[0].participantesIds.push(p.id);
    }
  }
  salvar();
  renderDistribuir();
  renderParticipantes();
  atualizarBages();
  toast(`${novos.length} novos participantes distribuídos!`);
}

  const enc = getEnc();

}

  const doc = new jspdf.jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
  const quartoMap = new Map();
  enc.quartos.forEach(q => (q.participantesIds || []).forEach(pid => quartoMap.set(pid, { nome: q.nome, cor: q.cor })));
  const lista = enc.participantes.map(p => ({ 
    nome: p.nome, idade: p.idade || '—', unidade: p.unidade || '—', 
    telefone: p.telefone || '—', emergNome: p.emergenciaNome || '—', 
    emergTel: p.emergenciaTel || '—', quarto: quartoMap.get(p.id) 
  })).sort((a, b) => a.nome.localeCompare(b.nome));
  
  doc.setFontSize(18); doc.text('Lista Geral de Participantes', 148.5, 20, { align: 'center' });
  doc.setFontSize(10); doc.text(`${enc.nome}`, 148.5, 30, { align: 'center' });
  doc.text(`Total: ${enc.participantes.length} participantes`, 148.5, 37, { align: 'center' });
  const body = lista.map(p => [p.quarto ? `■ ${p.quarto.nome}` : 'Sem quarto', p.nome, p.idade, p.unidade, p.telefone, p.emergNome, p.emergTel]);
  doc.autoTable({
    head: [['Quarto', 'Nome', 'Idade', 'Unidade', 'Telefone', 'Emergência', 'Emergência Tel']],
    body, startY: 45, styles: { fontSize: 8, cellPadding: 2, halign: 'center' },
    headStyles: { fillColor: [37, 99, 235], textColor: [255,255,255], fontSize: 9, fontStyle: 'bold' },
    margin: { left: 8, right: 8 },
    columnStyles: { 0: { cellWidth: 35 }, 1: { cellWidth: 55, halign: 'left' }, 2: { cellWidth: 18 }, 3: { cellWidth: 45, halign: 'left' }, 4: { cellWidth: 32 }, 5: { cellWidth: 45, halign: 'left' }, 6: { cellWidth: 32 } },
    didDrawCell: (data) => {
      if (data.column.index === 0 && data.cell.section === 'body') {
        const item = lista[data.row.index];
        if (item?.quarto?.cor) {
          const c = item.quarto.cor;
          doc.setFillColor(parseInt(c.slice(1,3),16), parseInt(c.slice(3,5),16), parseInt(c.slice(5,7),16));
          doc.rect(data.cell.x + 3, data.cell.y + 4, 4, 4, 'F');
        }
      }
    }
  });
  doc.save('Lista_Geral.pdf');
  toast('PDF gerado!');
}

// Adicionar participante manual
function adicionarParticipanteManual() {
  const nome = document.getElementById('addNome').value.trim();
  if (!nome) { toast('Nome é obrigatório'); return; }
  const enc = getEnc();
  const novoParticipante = {
    id: uid(),
    nome: nome,
    idade: parseInt(document.getElementById('addIdade').value) || 0,
    telefone: document.getElementById('addTelefone').value,
    unidade: document.getElementById('addUnidade').value,
    celula: document.getElementById('addCelula').value,
    emergenciaNome: document.getElementById('addEmergNome').value,
    emergenciaTel: document.getElementById('addEmergTel').value
  };
  enc.participantes.push(novoParticipante);
  salvar();
  renderParticipantes();
  renderDistribuir();
  atualizarBages();
  fecharModal('modalParticipante');
  document.getElementById('addNome').value = '';
  toast('Participante adicionado!');
}

// Eventos e inicialização
document.getElementById('btnDistribuirNovos').addEventListener('click', distribuirNovos);
document.getElementById('btnGerarListaGeral').addEventListener('click', gerarListaGeralPDF);
document.getElementById('btnVerSemQuarto').addEventListener('click', verSemQuarto);
document.getElementById('btnDistribuirSemQuarto').addEventListener('click', () => { distribuirNovos(); document.getElementById('modalSemQuarto').classList.remove('open'); });
document.getElementById('btnAdicionarManual').addEventListener('click', () => { document.getElementById('modalParticipante').classList.add('open'); });
document.getElementById('btnSalvarParticipante').addEventListener('click', adicionarParticipanteManual);
document.getElementById('btnResetarSistema').addEventListener('click', resetarSistema);

// Abas
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    const tabName = tab.dataset.tab;
    document.querySelectorAll('.tab-content').forEach(tc => tc.style.display = 'none');
    document.getElementById(`tab-${tabName}`).style.display = 'block';
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    if (tabName === 'participantes' && getEnc()) renderParticipantes();
    else if (tabName === 'distribuir' && getEnc()) renderDistribuir();
    else if (tabName === 'resumo' && getEnc()) renderResumo();
    if (getEnc()) atualizarBages();
  });
});

// Inicialização
carregar();
if (encontros.length) { encontroAtual = encontros[0].id; renderDistribuir(); atualizarBages(); }
</script>
