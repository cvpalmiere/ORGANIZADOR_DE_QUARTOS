<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chácara · Organizador de Quartos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
/* ============================================================
   DESIGN SYSTEM — Charcoal & Ember
   ============================================================ */
:root{
  --radius: 10px;
  --radius-sm: 6px;
  --radius-lg: 14px;
  --bg: oklch(0.16 0 0);
  --surface: oklch(0.19 0 0);
  --surface-elevated: oklch(0.235 0.003 60);
  --surface-hover: oklch(0.26 0.004 60);
  --fg: oklch(0.96 0.005 60);
  --muted-fg: oklch(0.68 0.01 60);
  --border: oklch(0.3 0.005 60);
  --border-soft: oklch(0.26 0.004 60);
  --ember: oklch(0.66 0.19 38);
  --ember-fg: oklch(0.14 0 0);
  --ember-muted: oklch(0.4 0.11 38);
  --ember-soft: oklch(0.66 0.19 38 / 0.12);
  --destructive: oklch(0.6 0.22 25);
  --destructive-soft: oklch(0.6 0.22 25 / 0.12);
  --success: oklch(0.68 0.15 148);
  --success-soft: oklch(0.68 0.15 148 / 0.14);
  --font-sans: "Manrope", ui-sans-serif, system-ui, sans-serif;
  --font-serif: "Sora", ui-sans-serif, system-ui, sans-serif;
  --shadow-md: 0 8px 24px -8px oklch(0 0 0 / 0.5);
}
*{ box-sizing:border-box; }
html,body{ margin:0; padding:0; }
body{
  background:var(--bg); color:var(--fg);
  font-family:var(--font-sans);
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
}
h1,h2,h3,h4,.font-serif{ font-family:var(--font-serif); font-weight:600; letter-spacing:-0.01em; margin:0; }
p{ margin:0; }
button{ font-family:inherit; }
svg.icon{ width:16px; height:16px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; display:block; flex-shrink:0; }
svg.icon-lg{ width:22px; height:22px; }
svg.icon-xl{ width:34px; height:34px; }

/* ---------- layout ---------- */
.app-header{
  position:sticky; top:0; z-index:40;
  background:oklch(0.19 0 0 / 0.9); backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border-soft);
}
.header-top{
  max-width:1280px; margin:0 auto; padding:16px 24px;
  display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap;
}
.brand{ display:flex; align-items:center; gap:12px; }
.brand-mark{
  width:40px; height:40px; border-radius:var(--radius);
  background:var(--ember); color:var(--ember-fg);
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 0 0 1px oklch(0.66 0.19 38 / 0.35), 0 10px 30px -10px oklch(0.66 0.19 38 / 0.5);
}
.brand-title{ font-family:var(--font-serif); font-size:19px; line-height:1.1; }
.brand-sub{ font-size:11px; text-transform:uppercase; letter-spacing:.14em; color:var(--muted-fg); margin-top:2px; }
.active-encontro-pill{ text-align:right; }
.active-encontro-pill .label{ font-size:10px; text-transform:uppercase; letter-spacing:.16em; color:var(--muted-fg); }
.active-encontro-pill .value{ font-family:var(--font-serif); font-size:15px; margin-top:2px; }

.tabs-wrap{ max-width:1280px; margin:0 auto; padding:0 24px; overflow-x:auto; }
.tabs{ display:flex; gap:2px; }
.tab-btn{
  display:flex; align-items:center; gap:8px; white-space:nowrap;
  padding:11px 16px; border:none; background:transparent; cursor:pointer;
  color:var(--muted-fg); font-size:13.5px; font-weight:600;
  border-bottom:2px solid transparent; transition:.15s;
}
.tab-btn:hover{ color:var(--fg); }
.tab-btn.active{ color:var(--fg); border-bottom-color:var(--ember); }

.container{ max-width:1280px; margin:0 auto; padding:28px 24px 60px; }
.tab-panel{ display:none; }
.tab-panel.active{ display:block; }

.page-head{ margin-bottom:22px; display:flex; align-items:flex-end; justify-content:space-between; gap:16px; flex-wrap:wrap; }
.page-eyebrow{ font-size:11px; text-transform:uppercase; letter-spacing:.18em; color:var(--ember); font-weight:700; margin-bottom:8px; }
.page-title{ font-size:32px; }
.page-desc{ color:var(--muted-fg); font-size:13.5px; margin-top:8px; max-width:560px; }

/* ---------- buttons ---------- */
.btn{
  display:inline-flex; align-items:center; gap:8px; justify-content:center;
  padding:10px 16px; border-radius:var(--radius-sm); border:1px solid transparent;
  font-size:13.5px; font-weight:600; cursor:pointer; transition:.15s; line-height:1;
}
.btn:disabled{ opacity:.45; cursor:not-allowed; }
.btn-primary{ background:var(--ember); color:var(--ember-fg); box-shadow:0 6px 18px -8px oklch(0.66 0.19 38 / 0.6); }
.btn-primary:hover:not(:disabled){ filter:brightness(1.08); }
.btn-outline{ background:var(--surface-elevated); border-color:var(--border); color:var(--fg); }
.btn-outline:hover:not(:disabled){ border-color:var(--ember-muted); background:var(--surface-hover); }
.btn-ghost{ background:transparent; color:var(--muted-fg); }
.btn-ghost:hover:not(:disabled){ color:var(--fg); background:var(--surface-elevated); }
.btn-danger{ background:var(--destructive-soft); color:oklch(0.75 0.18 25); }
.btn-danger:hover:not(:disabled){ background:oklch(0.6 0.22 25 / 0.22); }
.btn-sm{ padding:6px 11px; font-size:12.5px; }
.btn-icon{ padding:8px; width:34px; height:34px; }
.btn-block{ width:100%; }

/* ---------- forms ---------- */
label.field-label{ display:block; font-size:12px; font-weight:700; color:var(--muted-fg); text-transform:uppercase; letter-spacing:.06em; margin-bottom:6px; }
.input, .select, textarea.textarea{
  width:100%; background:var(--surface-elevated); border:1px solid var(--border);
  color:var(--fg); border-radius:var(--radius-sm); padding:10px 12px; font-size:14px; font-family:inherit;
  outline:none; transition:.15s;
}
.input:focus, .select:focus, textarea.textarea:focus{ border-color:var(--ember); box-shadow:0 0 0 3px var(--ember-soft); }
.input[type=color]{ padding:4px; height:42px; cursor:pointer; }
.field-row{ margin-bottom:14px; }
.field-grid{ display:grid; grid-template-columns:1fr 1fr; gap:14px; }
.checkbox-row{
  display:flex; align-items:flex-start; gap:10px; padding:12px 14px; border:1px solid var(--border-soft);
  border-radius:var(--radius-sm); background:var(--surface); cursor:pointer; transition:.15s;
}
.checkbox-row:hover{ border-color:var(--ember-muted); background:var(--surface-elevated); }
.checkbox-row input{ margin-top:2px; accent-color:var(--ember); width:16px; height:16px; cursor:pointer; }
.checkbox-row .cb-text b{ display:block; font-size:13.5px; }
.checkbox-row .cb-text span{ display:block; font-size:12px; color:var(--muted-fg); margin-top:2px; }

/* ---------- cards ---------- */
.card{ background:var(--surface); border:1px solid var(--border-soft); border-radius:var(--radius-lg); padding:22px; }
.card + .card{ margin-top:16px; }
.card-header{ display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:18px; }
.card-header h3{ font-size:17px; }
.card-header .card-sub{ font-size:12.5px; color:var(--muted-fg); margin-top:3px; }

.grid-2{ display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.grid-3{ display:grid; grid-template-columns:repeat(3,1fr); gap:16px; }
@media(max-width:900px){ .grid-2,.grid-3,.field-grid{ grid-template-columns:1fr; } }

/* ---------- stat boxes ---------- */
.stats-row{ display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
.stat-box{ background:var(--surface); border:1px solid var(--border-soft); border-radius:var(--radius); padding:12px 14px; }
.stat-box .stat-label{ font-size:10px; text-transform:uppercase; letter-spacing:.14em; color:var(--muted-fg); }
.stat-box .stat-value{ font-family:var(--font-serif); font-size:22px; margin-top:4px; }
.stat-box.warn .stat-value{ color:var(--ember); }

/* ---------- badges/chips ---------- */
.badge{ display:inline-flex; align-items:center; gap:5px; padding:3px 9px; border-radius:99px; font-size:11.5px; font-weight:700; }
.badge-success{ background:var(--success-soft); color:var(--success); }
.badge-warn{ background:var(--ember-soft); color:var(--ember); }
.badge-muted{ background:var(--surface-elevated); color:var(--muted-fg); border:1px solid var(--border); }
.color-dot{ width:12px; height:12px; border-radius:4px; flex-shrink:0; box-shadow:inset 0 0 0 1px oklch(1 0 0/.15); }

/* ---------- empty state ---------- */
.empty-state{ text-align:center; padding:60px 20px; color:var(--muted-fg); }
.empty-state svg{ width:40px; height:40px; margin:0 auto 14px; color:var(--muted-fg); opacity:.6; }
.empty-state h4{ color:var(--fg); font-size:16px; margin-bottom:6px; }
.empty-state p{ font-size:13px; max-width:340px; margin:0 auto; }

/* ---------- table ---------- */
.table-wrap{ overflow-x:auto; border:1px solid var(--border-soft); border-radius:var(--radius); }
table.data-table{ width:100%; border-collapse:collapse; font-size:13.5px; min-width:640px; }
table.data-table th{ text-align:left; padding:10px 14px; background:var(--surface-elevated); color:var(--muted-fg); font-size:11px; text-transform:uppercase; letter-spacing:.06em; font-weight:700; border-bottom:1px solid var(--border-soft); white-space:nowrap; }
table.data-table td{ padding:11px 14px; border-bottom:1px solid var(--border-soft); vertical-align:middle; }
table.data-table tr:last-child td{ border-bottom:none; }
table.data-table tr:hover td{ background:var(--surface-elevated); }

/* ---------- list rows (encontros/lideres) ---------- */
.list-row{ display:flex; align-items:center; justify-content:space-between; gap:14px; padding:14px 16px; border:1px solid var(--border-soft); border-radius:var(--radius); background:var(--surface); transition:.15s; }
.list-row + .list-row{ margin-top:10px; }
.list-row:hover{ border-color:var(--ember-muted); }
.list-row.selected{ border-color:var(--ember); background:var(--ember-soft); }
.list-row .row-title{ font-family:var(--font-serif); font-size:15.5px; }
.list-row .row-sub{ font-size:12px; color:var(--muted-fg); margin-top:3px; }
.row-actions{ display:flex; gap:6px; flex-shrink:0; }

/* ---------- room cards (distribuir) ---------- */
.room-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:16px; }
.room-card{ position:relative; overflow:hidden; border-radius:var(--radius-lg); border:1px solid var(--border-soft); background:var(--surface); transition:.15s; }
.room-card.dragover{ border-color:var(--ember); box-shadow:0 0 0 3px var(--ember-soft); }
.room-color-bar{ height:6px; width:100%; }
.room-body{ padding:18px; }
.room-top{ display:flex; align-items:flex-start; justify-content:space-between; gap:10px; }
.room-name-wrap{ display:flex; align-items:center; gap:10px; }
.room-swatch{ width:30px; height:30px; border-radius:8px; box-shadow:inset 0 0 0 1px oklch(1 0 0/.15); flex-shrink:0; }
.room-name{ font-family:var(--font-serif); font-size:18px; line-height:1.15; }
.room-vocacao{ font-size:10.5px; text-transform:uppercase; letter-spacing:.1em; color:var(--muted-fg); margin-top:2px; }
.room-leaders{ margin-top:12px; display:flex; flex-wrap:wrap; gap:6px; }
.leader-chip{ display:inline-flex; align-items:center; gap:5px; padding:3px 10px; border-radius:99px; font-size:11.5px; background:var(--ember-soft); color:var(--ember); border:1px solid oklch(0.66 0.19 38/.25); }
.room-members{ margin-top:14px; min-height:44px; display:flex; flex-direction:column; gap:6px; }
.member-chip{ display:flex; align-items:center; gap:8px; padding:8px 10px; border-radius:var(--radius-sm); background:var(--surface-elevated); font-size:13px; cursor:pointer; border:1px solid transparent; }
.member-chip:hover{ border-color:var(--ember-muted); }
.member-chip .grip{ color:var(--muted-fg); flex-shrink:0; }
.member-chip.dragging{ opacity:.4; }
.room-progress{ margin-top:16px; }
.progress-top{ display:flex; align-items:baseline; justify-content:space-between; font-size:11.5px; color:var(--muted-fg); margin-bottom:6px; }
.progress-track{ height:6px; border-radius:99px; background:var(--surface-elevated); overflow:hidden; }
.progress-fill{ height:100%; border-radius:99px; transition:width .2s; }
.room-pdf-check{ display:flex; align-items:center; gap:6px; font-size:11.5px; color:var(--muted-fg); }
.room-pdf-check input{ accent-color:var(--ember); cursor:pointer; }
.semquarto-dropzone{ margin-top:20px; border:1.5px dashed var(--border); border-radius:var(--radius-lg); padding:16px; }
.semquarto-dropzone.dragover{ border-color:var(--destructive); background:var(--destructive-soft); }

/* ---------- modal ---------- */
.modal-overlay{ position:fixed; inset:0; background:oklch(0 0 0/.6); backdrop-filter:blur(2px); display:flex; align-items:center; justify-content:center; z-index:100; padding:20px; }
.modal{ background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); width:100%; max-width:560px; max-height:88vh; overflow-y:auto; box-shadow:var(--shadow-md); }
.modal.modal-lg{ max-width:820px; }
.modal-head{ display:flex; align-items:center; justify-content:space-between; padding:18px 22px; border-bottom:1px solid var(--border-soft); position:sticky; top:0; background:var(--surface); z-index:2; }
.modal-head h3{ font-size:17px; }
.modal-body{ padding:22px; }
.modal-foot{ padding:16px 22px; border-top:1px solid var(--border-soft); display:flex; justify-content:flex-end; gap:8px; position:sticky; bottom:0; background:var(--surface); }

/* ---------- toast ---------- */
.toast-container{ position:fixed; bottom:20px; right:20px; z-index:200; display:flex; flex-direction:column; gap:8px; }
.toast{ background:var(--surface-elevated); border:1px solid var(--border); border-left:3px solid var(--ember); border-radius:var(--radius-sm); padding:12px 16px; font-size:13.5px; box-shadow:var(--shadow-md); min-width:240px; display:flex; align-items:center; gap:10px; animation:toast-in .2s ease; }
.toast.error{ border-left-color:var(--destructive); }
.toast.success{ border-left-color:var(--success); }
@keyframes toast-in{ from{ opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);} }

/* ---------- misc ---------- */
.divider{ height:1px; background:var(--border-soft); margin:20px 0; }
.hint-text{ font-size:12px; color:var(--muted-fg); }
.upload-drop{ border:1.5px dashed var(--border); border-radius:var(--radius-lg); padding:34px 20px; text-align:center; cursor:pointer; transition:.15s; }
.upload-drop:hover{ border-color:var(--ember-muted); background:var(--ember-soft); }
.upload-drop svg{ width:30px; height:30px; margin:0 auto 10px; color:var(--ember); }
.map-row{ display:grid; grid-template-columns:1fr 1fr; gap:12px; align-items:center; padding:9px 0; border-bottom:1px solid var(--border-soft); }
.map-row:last-child{ border-bottom:none; }
.map-row .map-field-name{ font-size:13px; font-weight:600; display:flex; align-items:center; gap:6px; }
.pill-toggle{ display:inline-flex; border:1px solid var(--border); border-radius:99px; overflow:hidden; }
.pill-toggle button{ border:none; background:transparent; color:var(--muted-fg); padding:7px 13px; font-size:12.5px; font-weight:700; cursor:pointer; }
.pill-toggle button.active{ background:var(--ember); color:var(--ember-fg); }
.action-icons{ display:flex; gap:4px; }
::-webkit-scrollbar{ width:9px; height:9px; }
::-webkit-scrollbar-thumb{ background:var(--border); border-radius:99px; }
::-webkit-scrollbar-track{ background:transparent; }
@media print{ body *{ visibility:hidden; } }
</style>
</head>
<body>

<header class="app-header">
  <div class="header-top">
    <div class="brand">
      <div class="brand-mark" id="iconBrand"></div>
      <div>
        <div class="brand-title">Chácara</div>
        <div class="brand-sub">Organizador de Quartos</div>
      </div>
    </div>
    <div style="display:flex; align-items:center; gap:18px;">
      <div class="active-encontro-pill">
        <div class="label">Encontro ativo</div>
        <div class="value" id="activeEncontroLabel">Nenhum selecionado</div>
      </div>
      <button class="btn btn-outline btn-sm" id="btnBackupExport"></button>
      <button class="btn btn-outline btn-sm" id="btnBackupImport"></button>
      <input type="file" id="backupFileInput" accept="application/json" style="display:none">
    </div>
  </div>
  <div class="tabs-wrap">
    <nav class="tabs" id="tabsNav"></nav>
  </div>
</header>

<div class="container">
  <div class="tab-panel" id="tab-encontros"></div>
  <div class="tab-panel" id="tab-quartos"></div>
  <div class="tab-panel" id="tab-regras"></div>
  <div class="tab-panel" id="tab-participantes"></div>
  <div class="tab-panel" id="tab-lideres"></div>
  <div class="tab-panel" id="tab-alocar"></div>
  <div class="tab-panel" id="tab-distribuir"></div>
</div>

<div id="modalRoot"></div>
<div class="toast-container" id="toastRoot"></div>

<script>

  x:'<path d="M18 6 6 18M6 6l12 12"/>',
  check:'<path d="M20 6 9 17l-5-5"/>',
  chevronDown:'<path d="m6 9 6 6 6-6"/>',
  grip:'<circle cx="9" cy="6" r="1.2"/><circle cx="15" cy="6" r="1.2"/><circle cx="9" cy="12" r="1.2"/><circle cx="15" cy="12" r="1.2"/><circle cx="9" cy="18" r="1.2"/><circle cx="15" cy="18" r="1.2"/>',
  alert:'<circle cx="12" cy="12" r="9.5"/><path d="M12 8v5M12 16h.01"/>',

const DB_KEY = 'chacara_organizador_data_v1';
function uid(){ return (crypto.randomUUID ? crypto.randomUUID() : 'id-'+Date.now()+'-'+Math.random().toString(16).slice(2)); }

function defaultData(){
  return { encontros: [], activeEncontroId: null };
}
let DB = loadDB();
function loadDB(){
  try{
    const raw = localStorage.getItem(DB_KEY);
    if(!raw) return defaultData();
    const parsed = JSON.parse(raw);
    if(!parsed.encontros) return defaultData();
    return parsed;
  }catch(e){ console.error('Erro ao carregar dados', e); return defaultData(); }
}
function saveDB(){
  localStorage.setItem(DB_KEY, JSON.stringify(DB));
}
function getActiveEncontro(){
  return DB.encontros.find(e => e.id === DB.activeEncontroId) || null;
}
function newEncontro(nome, data){
  return {
    id: uid(), nome, data,
    quartos: [],
    regras: {
      separarSobrenome:false, juntarSobrenome:false,
      separarTelefoneEmergencia:false, juntarTelefoneEmergencia:false,
      separarUnidade:false, juntarUnidade:false,
      separarFaixaEtaria:false, juntarFaixaEtaria:false,
      separarCelula:false, juntarCelula:false,
    },
    participantes: [],
    lideres: [],
    pdfSelecionados: {},
    distribuido:false,
  };
}

/* ==========================================================================

function toast(msg, type){
  const root = document.getElementById('toastRoot');
  const el = document.createElement('div');
  el.className = 'toast' + (type ? ' '+type : '');
  el.innerHTML = `${icon(type==='error'?'alert':'check')}<span>${msg}</span>`;
  root.appendChild(el);
  setTimeout(()=>{ el.style.opacity='0'; el.style.transition='opacity .25s'; setTimeout(()=>el.remove(),250); }, 3200);
}

const PARTICIPANT_FIELDS = [
  { key:'nome', label:'Nome', required:true },

  { key:'idade', label:'Idade', required:true },
  { key:'telefone', label:'Telefone', required:false },

  { key:'emergenciaNome', label:'Contato Emergência (Nome)', required:false },
  { key:'emergenciaTelefone', label:'Contato Emergência (Tel)', required:false },
];
// synonyms used for auto-detection of spreadsheet headers (normalized: lowercase, no accents)
const FIELD_SYNONYMS = {
  nome: ['nome completo','nome do participante','nome','participante'],
  sobrenome: ['sobrenome'],
  idade: ['idade'],
  telefone: ['celular','telefone','celular do participante','telefone do participante','whatsapp'],
  unidade: ['qual unidade do nucleo da fe voce participa','unidade/igreja','unidade','igreja','igreja do comprador','unidade da igreja'],
  celula: ['participa de celula? qual?','participa de celula','celula','qual celula'],
  alergia: ['tem restricao medica ou alimentar?','alergias/restricao','alergia','restricao','alergias'],
  remedio: ['toma remedio?','toma remedio','medicacao continua','usa medicacao'],
  emergenciaNome: ['nome contato de emergencia','contato emergencia (nome)','nome do contato de emergencia','contato de emergencia nome'],
  emergenciaTelefone: ['telefone contato de emergencia','contato emergencia (tel)','telefone do contato de emergencia','contato de emergencia telefone'],
};
function normalizeHeader(str){
  return String(str||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().replace(/\s+/g,' ').trim().replace(/[?.]/g,'');
}
function autoDetectMapping(headers){
  const mapping = {};
  const normHeaders = headers.map(h=>normalizeHeader(h));
  PARTICIPANT_FIELDS.forEach(f=>{
    const syns = FIELD_SYNONYMS[f.key] || [];
    let bestIdx = -1;
    for(const syn of syns){
      const idx = normHeaders.findIndex(h => h === syn);
      if(idx !== -1){ bestIdx = idx; break; }
    }
    if(bestIdx === -1){
      for(const syn of syns){
        const idx = normHeaders.findIndex(h => h.includes(syn) || syn.includes(h));
        if(idx !== -1){ bestIdx = idx; break; }
      }
    }
    mapping[f.key] = bestIdx;
  });
  return mapping;
}

/* ---- Excel import flow ---- */
function handleExcelFile(e){
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = (evt)=>{
    try{
      const data = new Uint8Array(evt.target.result);
      const wb = XLSX.read(data, {type:'array'});
      const sheetName = wb.SheetNames[0];
      const ws = wb.Sheets[sheetName];
      const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
      if(rows.length < 2){ toast('Planilha vazia ou sem dados.','error'); return; }
      const headers = rows[0].map(h=>String(h));
      const dataRows = rows.slice(1).filter(r => r.some(c => String(c).trim() !== ''));
      const mapping = autoDetectMapping(headers);
      importState = { headers, rows: dataRows, mapping };
      openMappingModal();
    }catch(err){
      console.error(err);
      toast('Não foi possível ler a planilha. Verifique o arquivo.','error');
    }
  };
  reader.readAsArrayBuffer(file);
  e.target.value = '';
}
function openMappingModal(){
  const { headers } = importState;
  const rowsHtml = PARTICIPANT_FIELDS.map(f=>{
    const opts = [`<option value="-1">— Não importar —</option>`]
      .concat(headers.map((h,i)=>`<option value="${i}" ${importState.mapping[f.key]===i?'selected':''}>${escapeHtml(h)}</option>`));
    return `<div class="map-row">
      <div class="map-field-name">${escapeHtml(f.label)} ${f.required?'<span style="color:var(--ember)">*</span>':''}</div>
      <select class="select" data-field="${f.key}">${opts.join('')}</select>
    </div>`;
  }).join('');
  openModal(`
    <div class="modal-head"><h3>Mapear colunas da planilha</h3><button class="btn btn-ghost btn-icon" onclick="closeModal()">${icon('x')}</button></div>
    <div class="modal-body">
      <p class="hint-text" style="margin-bottom:14px;">Detectamos automaticamente as colunas correspondentes. Confira e ajuste se necessário antes de importar (${importState.rows.length} linha(s) encontrada(s)). "Nome" pode ser o nome completo — o sobrenome será separado automaticamente se a coluna de sobrenome não for informada.</p>
      <div class="card" style="padding:14px 18px;">${rowsHtml}</div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="btnConfirmarImport">${icon('check')} Importar ${importState.rows.length} participante(s)</button>
    </div>
  `, {large:true});
  document.querySelectorAll('#modalRoot select[data-field]').forEach(sel=>{
    sel.addEventListener('change', ()=>{ importState.mapping[sel.dataset.field] = parseInt(sel.value); });
  });
  document.getElementById('btnConfirmarImport').addEventListener('click', confirmImport);
}
function confirmImport(){
  const enc = getActiveEncontro();
  const { rows, mapping } = importState;
  let count = 0;
  rows.forEach(row=>{
    const get = (key)=>{
      const idx = mapping[key];
      return (idx!==undefined && idx>=0 && row[idx]!==undefined) ? String(row[idx]).trim() : '';
    };
    let nome = get('nome');
    let sobrenome = get('sobrenome');
    if(nome && !sobrenome && mapping['sobrenome']===-1){
      const parts = nome.split(/\s+/);
      if(parts.length > 1){ nome = parts[0]; sobrenome = parts.slice(1).join(' '); }
    }
    if(!nome) return;
    const idadeRaw = get('idade');
    const idade = parseInt(idadeRaw) || 0;
    enc.participantes.push({
      id: uid(), nome, sobrenome, idade,
      telefone: get('telefone'), unidade: get('unidade'), celula: get('celula'),
      alergia: get('alergia'), remedio: get('remedio'),
      emergenciaNome: get('emergenciaNome'), emergenciaTelefone: get('emergenciaTelefone'),
      quartoId: null,
    });
    count++;
  });
  saveDB(); closeModal(); renderParticipantes();
  toast(`${count} participante(s) importado(s) com sucesso!`);
}

/* ==========================================================================
   DISTRIBUTION ALGORITHM
   ========================================================================== */
function faixaEtaria(idade){
  if(idade < 25) return 'jovem';
  if(idade > 50) return 'idoso';
  return 'neutro';
}
function campoRegra(participante, campo){
  switch(campo){
    case 'sobrenome': return (participante.sobrenome||'').trim().toLowerCase();
    case 'telefoneEmergencia': return (participante.emergenciaTelefone||'').trim();
    case 'unidade': return (participante.unidade||'').trim().toLowerCase();
    case 'faixaEtaria': return faixaEtaria(participante.idade);
    case 'celula': return (participante.celula||'').trim().toLowerCase();
  }
  return '';
}
const REGRA_CAMPOS = [
  ['Sobrenome','sobrenome'], ['TelefoneEmergencia','telefoneEmergencia'],
  ['Unidade','unidade'], ['FaixaEtaria','faixaEtaria'], ['Celula','celula'],
];
function chaveJuntar(participante, regras){
  const parts = [];
  REGRA_CAMPOS.forEach(([sufixo, campo])=>{
    if(regras['juntar'+sufixo]){
      const v = campoRegra(participante, campo);
      if(v) parts.push(campo+':'+v);
    }
  });
  return parts.join('|');
}
function respeitaSepara(participante, roomId, ocupantesPorQuarto, regras){
  const ocupantes = ocupantesPorQuarto[roomId] || [];
  for(const [sufixo, campo] of REGRA_CAMPOS){
    if(regras['separar'+sufixo]){
      const v = campoRegra(participante, campo);
      if(!v) continue;
      if(ocupantes.some(o => campoRegra(o, campo) === v)) return false;
    }
  }
  return true;
}
function distribuirAutomatico(enc){
  if(enc.quartos.length === 0){ toast('Cadastre ao menos um quarto antes de distribuir.','error'); return; }
  const regras = enc.regras;
  enc.participantes.forEach(p=> p.quartoId = null);

  const vagas = {};
  enc.quartos.forEach(q => vagas[q.id] = Math.max(0, q.capacidade - q.numLideres));
  const ocupantesPorQuarto = {};
  enc.quartos.forEach(q => ocupantesPorQuarto[q.id] = []);

  const jovens = enc.participantes.filter(p => faixaEtaria(p.idade) === 'jovem');
  const idosos = enc.participantes.filter(p => faixaEtaria(p.idade) === 'idoso');
  const neutros = enc.participantes.filter(p => faixaEtaria(p.idade) === 'neutro');

  const roomsJovem = enc.quartos.filter(q => q.vocacao === 'concentrar-25');
  const roomsIdoso = enc.quartos.filter(q => q.vocacao === 'concentrar+50');

  const filaGeral = [];

  function ordenarPorJuntar(lista){
    return lista.map(p=>({p, key: chaveJuntar(p, regras)}))
      .sort((a,b)=> (a.key||'\uffff').localeCompare(b.key||'\uffff'))
      .map(x=>x.p);
  }

  function alocarGrupo(grupo, rooms){
    if(rooms.length === 0){ filaGeral.push(...grupo); return; }
    const ordenado = ordenarPorJuntar(grupo);
    let pointer = 0, lastKey = null;
    for(const p of ordenado){
      const key = chaveJuntar(p, regras);
      const ordem = [];
      if(key && key === lastKey) ordem.push(pointer);
      for(let i=0;i<rooms.length;i++) if(!ordem.includes(i)) ordem.push(i);
      let placed = false;
      for(const idx of ordem){
        const room = rooms[idx];
        if(vagas[room.id] > 0 && respeitaSepara(p, room.id, ocupantesPorQuarto, regras)){
          p.quartoId = room.id; vagas[room.id]--; ocupantesPorQuarto[room.id].push(p);
          pointer = idx; placed = true; break;
        }
      }
      lastKey = key;
      if(!placed) filaGeral.push(p);
    }
  }

  alocarGrupo(jovens, roomsJovem.length ? roomsJovem : enc.quartos);
  alocarGrupo(idosos, roomsIdoso.length ? roomsIdoso : enc.quartos);

  const restantes = ordenarPorJuntar([...neutros, ...filaGeral]);
  filaGeral.length = 0;
  let pointer = 0, lastKey = null;
  for(const p of restantes){
    const key = chaveJuntar(p, regras);
    const ordem = [];
    if(key && key === lastKey) ordem.push(pointer);
    for(let i=0;i<enc.quartos.length;i++) if(!ordem.includes(i)) ordem.push(i);
    let placed = false;
    for(const idx of ordem){
      const room = enc.quartos[idx];
      if(vagas[room.id] > 0 && respeitaSepara(p, room.id, ocupantesPorQuarto, regras)){
        p.quartoId = room.id; vagas[room.id]--; ocupantesPorQuarto[room.id].push(p);
        pointer = idx; placed = true; break;
      }
    }
    lastKey = key;
    if(!placed) filaGeral.push(p);
  }

  enc.distribuido = true;
  saveDB();
  const semQuarto = filaGeral.length;
  if(semQuarto>0){ toast(`Distribuição concluída. ${semQuarto} participante(s) ficaram sem quarto (capacidade insuficiente ou conflito de regras).`); }
  else{ toast('Distribuição automática concluída com sucesso!'); }
}

            ${lideres.length ? lideres.map(l=>`<span class="leader-chip">${icon('crown')} ${escapeHtml(l.nome)}</span>`).join('') : '<span class="hint-text">Sem líder alocado</span>'}
          </div>
          <div class="room-members" data-dropzone="${q.id}">
            ${membros.map(p=>`
              <div class="member-chip" draggable="true" data-pid="${p.id}">
                <span class="grip">${icon('grip')}</span>
                <span>${escapeHtml(p.nome)} ${escapeHtml(p.sobrenome)}</span>
              </div>`).join('') || '<span class="hint-text" style="padding:6px 2px;">Nenhum participante alocado.</span>'}
          </div>
          <div class="room-progress">
            <div class="progress-top"><span>Ocupação</span><span style="font-family:var(--font-serif); font-size:14px; color:var(--fg);">${membros.length}/${vagas}</span></div>
            <div class="progress-track"><div class="progress-fill" style="width:${Math.min(pct,100)}%; background:${pct>=100?'var(--ember)':q.cor};"></div></div>
          </div>
        </div>
      </div>`;
    }).join('');

    return `
      <div class="page-head">
        <div>
          <div class="page-eyebrow">Aba principal</div>
          <h1 class="page-title">Distribuir participantes</h1>
          <p class="page-desc">Rode a distribuição automática, ajuste manualmente (arraste ou clique num participante) e gere os PDFs.</p>
        </div>
        <div class="stats-row" style="min-width:340px;">
          <div class="stat-box"><div class="stat-label">Quartos</div><div class="stat-value">${enc.quartos.length}</div></div>
          <div class="stat-box"><div class="stat-label">Alocados</div><div class="stat-value">${totalOcupado}/${totalCapacity}</div></div>
          <div class="stat-box ${semQuarto.length>0?'warn':''}"><div class="stat-label">Sem quarto</div><div class="stat-value">${semQuarto.length}</div></div>
        </div>
      </div>

      <div style="display:flex; flex-wrap:wrap; gap:8px; margin-bottom:22px;">
        <button class="btn btn-primary" id="btnDistribuirAuto">${icon('shuffle')} Distribuir automático</button>
        <button class="btn btn-outline" id="btnVerSemQuarto">${icon('alert')} Ver sem quarto (${semQuarto.length})</button>
        <div style="width:1px; background:var(--border); margin:0 6px;"></div>
        <button class="btn btn-outline" id="btnPdfGeral">${icon('fileText')} Lista Geral (PDF)</button>
        <button class="btn btn-outline" id="btnPdfPublicosSel">Públicos (Selecionados)</button>
        <button class="btn btn-outline" id="btnPdfPrivadosSel">Privados (Selecionados)</button>
        <button class="btn btn-outline" id="btnPdfAmbosSel">Ambos (Selecionados)</button>
        <button class="btn btn-outline" id="btnPdfPublicosTodos">Todos Públicos</button>
        <button class="btn btn-outline" id="btnPdfPrivadosTodos">Todos Privados</button>
        <button class="btn btn-outline" id="btnPdfAmbosTodos">Todos Ambos</button>
      </div>

      ${enc.quartos.length===0 ? `<div class="empty-state">${icon('shuffle')}<h4>Nenhum quarto cadastrado</h4><p>Cadastre quartos e participantes antes de distribuir.</p></div>` : `<div class="room-grid">${roomsHtml}</div>`}

      <div class="semquarto-dropzone" data-dropzone="__sem_quarto__">
        <div style="display:flex; align-items:center; gap:8px; margin-bottom:10px; color:var(--muted-fg); font-size:12.5px; text-transform:uppercase; letter-spacing:.08em; font-weight:700;">${icon('inbox')} Sem quarto — solte aqui para desalocar</div>
        <div style="display:flex; flex-wrap:wrap; gap:8px;">
          ${semQuarto.length ? semQuarto.map(p=>`
            <div class="member-chip" draggable="true" data-pid="${p.id}" style="border:1px dashed var(--border);">
              <span class="grip">${icon('grip')}</span><span>${escapeHtml(p.nome)} ${escapeHtml(p.sobrenome)}</span>
            </div>`).join('') : '<span class="hint-text">Todos os participantes estão alocados.</span>'}
        </div>
      </div>
    `;
  });
  const enc = getActiveEncontro(); if(!enc) return;

  document.getElementById('btnDistribuirAuto').addEventListener('click', ()=>{
    confirmAction('Isso irá redistribuir todos os participantes automaticamente, substituindo alocações manuais atuais. Deseja continuar?', ()=>{
      distribuirAutomatico(enc); renderDistribuir();
    });
  });
  document.getElementById('btnVerSemQuarto').addEventListener('click', openSemQuartoModal);

  // Cada botão de PDF é religado individualmente a cada renderização (os
  // botões são recriados junto com o innerHTML da aba, então nunca há
  // listener duplicado ou "perdido"). Toda ação passa pelo wrapper de
  // tratamento de erro, que avisa o usuário caso jsPDF/autoTable não tenham
  // carregado ou qualquer outro erro ocorra durante a geração.
  const PDF_ACTIONS = {
    btnPdfGeral: () => gerarPdfListaGeral(enc),
    btnPdfPublicosSel: () => gerarPdfsQuartos(enc, 'publico', true),
    btnPdfPrivadosSel: () => gerarPdfsQuartos(enc, 'privado', true),
    btnPdfAmbosSel: () => gerarPdfsQuartos(enc, 'ambos', true),
    btnPdfPublicosTodos: () => gerarPdfsQuartos(enc, 'publico', false),
    btnPdfPrivadosTodos: () => gerarPdfsQuartos(enc, 'privado', false),
    btnPdfAmbosTodos: () => gerarPdfsQuartos(enc, 'ambos', false),
  };
  Object.keys(PDF_ACTIONS).forEach(id=>{
    const btn = document.getElementById(id);
    if(btn) btn.addEventListener('click', ()=> executarComTratamentoDeErro(PDF_ACTIONS[id]));
  });

  el.querySelectorAll('[data-action="toggle-pdf"]').forEach(cb=>{
    cb.addEventListener('change', ()=>{ enc.pdfSelecionados[cb.dataset.qid] = cb.checked; saveDB(); });
  });

  // click chip -> move modal
  el.querySelectorAll('.member-chip').forEach(chip=>{
    chip.addEventListener('click', (e)=>{
      if(chip.classList.contains('dragging')) return;
      openMoveParticipanteModal(chip.dataset.pid);
    });
    chip.addEventListener('dragstart', (e)=>{
      draggedParticipantId = chip.dataset.pid;
      chip.classList.add('dragging');
      e.dataTransfer.setData('text/plain', chip.dataset.pid);
    });
    chip.addEventListener('dragend', ()=> chip.classList.remove('dragging'));
  });

  el.querySelectorAll('[data-dropzone]').forEach(zone=>{
    zone.addEventListener('dragover', (e)=>{ e.preventDefault(); zone.closest('.room-card, .semquarto-dropzone')?.classList.add('dragover'); });
    zone.addEventListener('dragleave', ()=>{ zone.closest('.room-card, .semquarto-dropzone')?.classList.remove('dragover'); });
    zone.addEventListener('drop', (e)=>{
      e.preventDefault();
      zone.closest('.room-card, .semquarto-dropzone')?.classList.remove('dragover');
      const pid = e.dataTransfer.getData('text/plain') || draggedParticipantId;
      if(!pid) return;
      const target = zone.dataset.dropzone;
      moveParticipante(pid, target === '__sem_quarto__' ? null : target);
    });
  });
}
function moveParticipante(participantId, quartoId){
  const enc = getActiveEncontro();
  const p = enc.participantes.find(x=>x.id===participantId);
  if(!p) return;
  if(quartoId){
    const q = enc.quartos.find(x=>x.id===quartoId);
    const ocupados = enc.participantes.filter(x=>x.quartoId===quartoId).length;
    const vagas = q.capacidade - q.numLideres;
    if(ocupados >= vagas){ toast(`O quarto ${q.nome} está com capacidade máxima.`, 'error'); return; }
  }
  p.quartoId = quartoId;
  saveDB(); renderDistribuir();
}
function openMoveParticipanteModal(participantId){
  const enc = getActiveEncontro();
  const p = enc.participantes.find(x=>x.id===participantId);
  if(!p) return;
  const opts = enc.quartos.map(q=>{
    const ocupados = enc.participantes.filter(x=>x.quartoId===q.id).length;
    const vagas = q.capacidade - q.numLideres;
    return `<option value="${q.id}" ${p.quartoId===q.id?'selected':''} ${ocupados>=vagas && p.quartoId!==q.id ? 'disabled':''}>${escapeHtml(q.nome)} (${ocupados}/${vagas})</option>`;
  }).join('');
  openModal(`
    <div class="modal-head"><h3>Mover ${escapeHtml(p.nome)} ${escapeHtml(p.sobrenome)}</h3><button class="btn btn-ghost btn-icon" onclick="closeModal()">${icon('x')}</button></div>
    <div class="modal-body">
      <label class="field-label">Quarto de destino</label>
      <select class="select" id="moveSelect">
        <option value="">— Sem quarto —</option>
        ${opts}
      </select>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="btnConfirmarMove">${icon('check')} Mover</button>
    </div>
  `);
  document.getElementById('btnConfirmarMove').addEventListener('click', ()=>{
    const val = document.getElementById('moveSelect').value;
    closeModal();
    moveParticipante(participantId, val || null);
  });
}
function openSemQuartoModal(){
  const enc = getActiveEncontro();
  const semQuarto = enc.participantes.filter(p=>!p.quartoId);
  const rows = semQuarto.map(p=>`
    <div class="list-row" data-id="${p.id}">
      <div><div class="row-title">${escapeHtml(p.nome)} ${escapeHtml(p.sobrenome)}</div><div class="row-sub">${p.idade} anos · ${escapeHtml(p.unidade)||'—'}</div></div>
      <button class="btn btn-outline btn-sm" data-action="mover">Mover para quarto</button>
    </div>`).join('');
  openModal(`
    <div class="modal-head"><h3>Participantes sem quarto (${semQuarto.length})</h3><button class="btn btn-ghost btn-icon" onclick="closeModal()">${icon('x')}</button></div>
    <div class="modal-body">${semQuarto.length ? rows : '<p class="hint-text">Todos os participantes estão alocados.</p>'}</div>
    <div class="modal-foot"><button class="btn btn-outline" onclick="closeModal()">Fechar</button></div>
  `, {large:true});
  document.querySelectorAll('#modalRoot [data-action="mover"]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const id = btn.closest('.list-row').dataset.id;
      closeModal();
      openMoveParticipanteModal(id);
    });
  });
}

/* ==========================================================================
   PDF GENERATION
   ========================================================================== */
// Executa uma ação de geração de PDF protegendo contra falhas silenciosas:
// se as bibliotecas jsPDF/autoTable não carregarem (ex.: bloqueio de rede/CDN)
// ou qualquer erro ocorrer durante a geração, o usuário vê um aviso claro
// em vez do botão parecer "não fazer nada".
function executarComTratamentoDeErro(fn){
  try{
    if(!window.jspdf || !window.jspdf.jsPDF){
      toast('Não foi possível carregar a biblioteca de geração de PDF (jsPDF). Verifique sua conexão com a internet e recarregue a página.', 'error');
      return;
    }
    if(!window.jspdf.jsPDF.API || typeof window.jspdf.jsPDF.API.autoTable !== 'function'){
      toast('Não foi possível carregar o plugin de tabelas do PDF (autoTable). Verifique sua conexão com a internet e recarregue a página.', 'error');
      return;
    }
    fn();
  }catch(err){
    console.error('Erro ao gerar PDF:', err);
    toast('Ocorreu um erro ao gerar o PDF: ' + (err && err.message ? err.message : 'erro desconhecido') + '. Veja o console para detalhes.', 'error');
  }
}
function hexToRgb(hex){
  hex = (hex||'#888888').replace('#','');
  if(hex.length===3) hex = hex.split('').map(c=>c+c).join('');
  const num = parseInt(hex,16);
  return [ (num>>16)&255, (num>>8)&255, num&255 ];
}
function gerarPdfListaGeral(enc){
  if(enc.participantes.length===0){ toast('Não há participantes para gerar o PDF.','error'); return; }
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation:'portrait', unit:'pt', format:'a4' });
  const pageW = doc.internal.pageSize.getWidth();
  doc.setFont('helvetica','bold'); doc.setFontSize(16);
  doc.text(enc.nome, 40, 42);
  doc.setFont('helvetica','normal'); doc.setFontSize(10); doc.setTextColor(90);
  doc.text(`${formatDateBR(enc.data)}  ·  ${enc.participantes.length} participante(s)`, 40, 58);
  doc.setTextColor(0);

  const ordenado = [...enc.participantes].sort((a,b)=> (a.nome+a.sobrenome).localeCompare(b.nome+b.sobrenome));
  // Cada linha carrega sua própria cor de quarto (dataKey "cor"). Isso evita
  // qualquer dependência do índice interno de paginação do autoTable —
  // era essa dependência (ordenado[data.row.index]) que causava o erro
  // "Cannot read properties of undefined (reading 'quartoId')".
  const body = ordenado.map(p=>{
    const q = enc.quartos.find(qt=>qt.id===p.quartoId);
    return {
      cor: q ? q.cor : null,
      nome: `${p.nome} ${p.sobrenome}`,
      quarto: q ? q.nome : 'Sem quarto',
      unidade: p.unidade || '—',
      telefone: p.telefone || '—',
    };
  });
  doc.autoTable({
    startY: 72,
    columns: [
      { header:'', dataKey:'cor' },
      { header:'Nome', dataKey:'nome' },
      { header:'Quarto', dataKey:'quarto' },
      { header:'Igreja/Unidade', dataKey:'unidade' },
      { header:'Telefone', dataKey:'telefone' },
    ],
    body,
    styles:{ font:'helvetica', fontSize:9.5, cellPadding:5 },
    headStyles:{ fillColor:[35,35,35], textColor:255 },
    columnStyles:{ cor:{ cellWidth:14 } },
    didParseCell: (data)=>{
      // a coluna "cor" guarda o hex ou null — nunca deve aparecer como texto
      if(data.column.dataKey==='cor') data.cell.text = [''];
    },
    didDrawCell: (data)=>{
      if(data.section==='body' && data.column.dataKey==='cor'){
        const cor = data.row.raw.cor;
        if(cor){
          const [r,g,b] = hexToRgb(cor);
          doc.setFillColor(r,g,b);
          doc.rect(data.cell.x+3, data.cell.y+data.cell.height/2-4, 8, 8, 'F');
        }
      }
    },
    margin:{ left:40, right:40 },
  });
  doc.save(`${slug(enc.nome)}-lista-geral.pdf`);
  toast('PDF da lista geral gerado.');
}
function slug(str){ return String(str).normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,''); }

function gerarPdfsQuartos(enc, tipo, apenasSelecionados){
  let quartos = enc.quartos;
  if(apenasSelecionados) quartos = quartos.filter(q => enc.pdfSelecionados[q.id] !== false);
  if(quartos.length===0){ toast('Nenhum quarto selecionado.','error'); return; }
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation:'landscape', unit:'pt', format:'a4' });
  let first = true;
  quartos.forEach(q=>{
    if(tipo==='publico' || tipo==='ambos'){
      if(!first) doc.addPage(); first=false;
      desenharCorpoPublico(doc, enc, q);
    }
    if(tipo==='privado' || tipo==='ambos'){
      if(!first) doc.addPage(); first=false;
      desenharCorpoPrivado(doc, enc, q);
    }
  });
  doc.save(`${slug(enc.nome)}-quartos-${tipo}.pdf`);
  toast('PDF(s) de quarto gerado(s) com sucesso.');
}
function desenharCabecalhoQuarto(doc, enc, q){
  const pageW = doc.internal.pageSize.getWidth();
  const [r,g,b] = hexToRgb(q.cor);
  doc.setFillColor(r,g,b);
  doc.rect(0,0,pageW,80,'F');
  const brightness = (r*299+g*587+b*114)/1000;
  const textColor = brightness > 150 ? 20 : 255;
  doc.setTextColor(textColor);
  doc.setFont('helvetica','bold'); doc.setFontSize(24);
  doc.text(q.nome, 40, 40);
  doc.setFont('helvetica','normal'); doc.setFontSize(11);
  doc.text(enc.nome + '  ·  ' + formatDateBR(enc.data), 40, 60);
  const lideres = enc.lideres.filter(l=>l.quartoId===q.id).map(l=>l.nome).join(', ') || 'Sem líder alocado';
  doc.setFontSize(10);
  doc.text('Líder(es): ' + lideres, pageW-40, 60, {align:'right'});
  doc.setTextColor(0);
}
function desenharCorpoPublico(doc, enc, q){
  const pageW = doc.internal.pageSize.getWidth();
  const membros = enc.participantes.filter(p=>p.quartoId===q.id).sort((a,b)=>(a.nome+a.sobrenome).localeCompare(b.nome+b.sobrenome));
  const body = membros.map(p=>[`${p.nome} ${p.sobrenome}`]);
  // Tabela de coluna única, fonte grande e centralizada — layout limpo para
  // afixar na porta do quarto. Largura reduzida (margens laterais maiores)
  // para não esticar uma única coluna por toda a página paisagem.
  doc.autoTable({
    startY: 100,
    head: [['Nome']],
    body: body.length ? body : [['Nenhum participante alocado.']],
    styles:{ font:'helvetica', fontSize:15, cellPadding:5, halign:'center', valign:'middle', textColor:30 },
    headStyles:{ fillColor:[35,35,35], textColor:255, fontSize:11, halign:'center' },
    margin:{ left: pageW*0.22, right: pageW*0.22, top:100 },
    didDrawPage: ()=> desenharCabecalhoQuarto(doc, enc, q),
  });
}
function desenharCorpoPrivado(doc, enc, q){
  const membros = enc.participantes.filter(p=>p.quartoId===q.id).sort((a,b)=>(a.nome+a.sobrenome).localeCompare(b.nome+b.sobrenome));
  const body = membros.map(p=>[
    `${p.nome} ${p.sobrenome}`, p.telefone||'—', p.emergenciaTelefone||'—', p.emergenciaNome||'—', p.unidade||'—', p.alergia||'—'
  ]);
  // Espaçamento: o espaço que antes acomodava 8 nomes (fontSize 11 / padding 7)
  // agora acomoda 10, mantendo a mesma fonte (não reduzida) e só encolhendo
  // o preenchimento vertical de cada linha na proporção 8/10.
  doc.autoTable({
    startY: 100,
    head:[['Nome','Telefone','Tel. Emergência','Nome Emergência','Igreja/Unidade','Alergia/Restrição']],
    body,
    styles:{ font:'helvetica', fontSize:11, cellPadding:4.5 },
    headStyles:{ fillColor:[35,35,35], textColor:255 },
    margin:{ left:40, right:40, top:100 },
    didDrawPage: ()=> desenharCabecalhoQuarto(doc, enc, q),
  });
}

/* ==========================================================================
   INIT
   ========================================================================== */
function renderAll(){
  updateHeaderPill();
  if(!document.getElementById('tab-encontros').innerHTML || currentTab==='encontros') renderEncontros();
  if(currentTab==='quartos') renderQuartos();
  if(currentTab==='regras') renderRegras();
  if(currentTab==='participantes') renderParticipantes();
  if(currentTab==='lideres') renderLideres();
  if(currentTab==='alocar') renderAlocar();
  if(currentTab==='distribuir') renderDistribuir();
  // pre-render all so switching is instant / data stays fresh
  renderEncontros(); renderQuartos(); renderRegras(); renderParticipantes(); renderLideres(); renderAlocar(); renderDistribuir();
}
renderTabsNav();
document.getElementById('tab-'+currentTab).classList.add('active');
renderAll();
</script>
